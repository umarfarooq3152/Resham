[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["src/**", "migrations/**", "pyproject.toml", "alembic.ini", "Dockerfile"]

[deploy]
preDeployCommand = "alembic upgrade head"
startCommand = "/bin/sh -c 'uvicorn resham.api.main:app --host 0.0.0.0 --port ${PORT:-8000}'"
healthcheckPath = "/healthz"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
