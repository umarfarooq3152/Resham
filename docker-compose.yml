services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: resham
      POSTGRES_PASSWORD: resham
      POSTGRES_DB: resham
    ports:
      - "5433:5432"
    volumes:
      - resham_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resham"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  chroma:
    image: chromadb/chroma:0.5.23
    ports:
      - "8001:8000"
    volumes:
      - resham_chroma_data:/chroma/chroma

  # One-shot: brings the schema to head, then exits. api/worker wait on it
  # via `service_completed_successfully` so neither starts against a stale
  # or half-migrated database.
  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://resham:resham@postgres:5432/resham
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    command: ["uvicorn", "resham.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://resham:resham@postgres:5432/resham
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      chroma:
        condition: service_started
    restart: unless-stopped

  # Recurring crawl + Chroma re-index on CRAWL_INTERVAL_HOURS (worker/main.py) —
  # runs continuously so the catalog and in_stock/removed status never go
  # stale without someone manually re-triggering a crawl.
  worker:
    build: .
    command: ["python", "-m", "resham.worker.main"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://resham:resham@postgres:5432/resham
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      chroma:
        condition: service_started
    restart: unless-stopped

volumes:
  resham_postgres_data:
  resham_chroma_data:
